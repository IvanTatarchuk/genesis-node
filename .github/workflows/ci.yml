name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx eslint .

      - run: npx tsc --noEmit

      - run: npm test

      - name: Build (Supabase env vars intentionally unset — must fail gracefully, not crash)
        run: npm run build
